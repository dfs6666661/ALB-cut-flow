<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>登录 - ALB / 中间件切流工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5e7eb;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      --btn:#111827;
      --btn2:#1f2937;
      --blue:#2563eb;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100vh;
      background: radial-gradient(1200px 600px at 20% 20%, #eef2ff 0%, var(--bg) 55%, #f8fafc 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      overflow:hidden;
    }

    .wrap{
      min-height:100vh;
      display:grid;
      grid-template-columns: 1.2fr 1fr;
      gap:40px;
      padding:40px clamp(16px, 4vw, 64px);
      align-items:center;
    }

    /* 左侧：插画区域 */
    .hero{
      position:relative;
      height: min(560px, 70vh);
      border-radius: 28px;
      padding: 26px;
      background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.35));
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:-120px;
      background: radial-gradient(closest-side, rgba(99,102,241,0.20), transparent 65%),
                  radial-gradient(closest-side, rgba(34,197,94,0.14), transparent 60%),
                  radial-gradient(closest-side, rgba(245,158,11,0.14), transparent 60%);
      transform: rotate(12deg);
    }
    .hero-head{
      position:relative;
      z-index:2;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom: 18px;
    }
    .brand{
      font-weight: 800;
      letter-spacing: .2px;
      font-size: 18px;
    }
    .tag{
      font-size: 12px;
      color: var(--muted);
      padding: 6px 10px;
      border: 1px solid rgba(15,23,42,0.10);
      border-radius:999px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(10px);
    }

    .crew{
      position:relative;
      z-index:2;
      height: calc(100% - 48px);
      display:flex;
      align-items:flex-end;
      justify-content:flex-start;
      gap: 18px;
      padding: 12px 12px 20px 12px;
    }

    /* 小人通用 */
    .char{
      position:relative;
      border-radius: 22px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      transform: translateZ(0);
      transition: transform .25s ease;
    }
    .char:hover{ transform: translateY(-4px); }

    /* 不同形状 */
    .c1{ width: 210px; height: 150px; border-radius: 120px 120px 30px 30px; background:#fb923c; }
    .c2{ width: 120px; height: 240px; border-radius: 26px; background:#6d28d9; margin-bottom: 28px;}
    .c3{ width: 90px; height: 210px; border-radius: 24px; background:#111827; margin-bottom: 8px;}
    .c4{ width: 130px; height: 220px; border-radius: 80px 80px 26px 26px; background:#facc15; margin-bottom: 14px;}

    /* 脸部 */
    .face{
      position:absolute;
      top: 38px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 70px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 12px;
      pointer-events:none;
      transition: transform .25s ease;
    }
    .eyes{
      display:flex;
      gap: 18px;
      align-items:center;
      justify-content:center;
      width: 100%;
    }
    .eye{
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      position:relative;
      overflow:hidden;
      box-shadow: inset 0 0 0 1px rgba(15,23,42,0.06);
    }
    .pupil{
      width: 7px; height: 7px;
      border-radius:999px;
      background: rgba(15,23,42,0.92);
      position:absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transition: transform .10s linear;
    }
    .mouth{
      width: 34px;
      height: 12px;
      border-radius: 0 0 16px 16px;
      border: 2px solid rgba(15,23,42,0.65);
      border-top: 0;
      opacity: 0.75;
      transform-origin: center;
      transition: transform .20s ease, border-radius .20s ease, height .20s ease, width .20s ease;
    }

    /* 某些小人脸位置微调 */
    .c1 .face{ top: 44px; width: 70%; }
    .c2 .face{ top: 54px; width: 70%; }
    .c3 .face{ top: 56px; width: 76%; }
    .c4 .face{ top: 58px; width: 70%; }

    /* 右侧：登录卡片 */
    .panel{
      display:flex;
      justify-content:center;
    }
    .card{
      width: min(420px, 92vw);
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(14px);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 26px;
    }
    .title{
      font-size: 30px;
      font-weight: 900;
      margin: 0;
      letter-spacing: .2px;
    }
    .subtitle{
      margin: 6px 0 18px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .field{
      margin-top: 12px;
    }
    label{
      display:block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input{
      width:100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      font-size: 14px;
      outline:none;
      background: rgba(255,255,255,0.88);
      transition: border .15s ease, box-shadow .15s ease;
    }
    input:focus{
      border-color: rgba(37, 99, 235, 0.65);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .row a{ color: var(--muted); text-decoration:none; }
    .row a:hover{ text-decoration:underline; }

    .btn{
      margin-top: 18px;
      width:100%;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      background: linear-gradient(180deg, var(--btn), var(--btn2));
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease;
    }
    .btn:hover{
      filter: brightness(1.03);
      transform: translateY(-1px);
    }
    .btn:active{ transform: translateY(0px) scale(0.99); }

    .error{
      margin-top: 12px;
      color:#dc2626;
      font-size: 13px;
    }

    /* 响应式 */
    @media (max-width: 980px){
      body{ overflow:auto; }
      .wrap{
        grid-template-columns: 1fr;
      }
      .hero{ height: 380px; }
    }
  </style>
</head>
<body>
  <canvas id="fxCanvas" style="
    position:fixed; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:999;
  "></canvas>
  <div class="wrap">
    <!-- 左：四个小人 -->
    <section class="hero" id="hero">
      <div class="hero-head">
        <div class="brand">ALB / 中间件切流工具</div>
        <div class="tag">bastion • secure login</div>
      </div>

      <div class="crew" id="crew">
        <div class="char c1" data-char>
          <div class="face" data-face>
            <div class="eyes">
              <div class="eye"><div class="pupil" data-pupil></div></div>
              <div class="eye"><div class="pupil" data-pupil></div></div>
            </div>
            <div class="mouth" data-mouth></div>
          </div>
        </div>

        <div class="char c2" data-char>
          <div class="face" data-face>
            <div class="eyes">
              <div class="eye"><div class="pupil" data-pupil></div></div>
              <div class="eye"><div class="pupil" data-pupil></div></div>
            </div>
            <div class="mouth" data-mouth></div>
          </div>
        </div>

        <div class="char c3" data-char>
          <div class="face" data-face>
            <div class="eyes">
              <div class="eye"><div class="pupil" data-pupil></div></div>
              <div class="eye"><div class="pupil" data-pupil></div></div>
            </div>
            <div class="mouth" data-mouth></div>
          </div>
        </div>

        <div class="char c4" data-char>
          <div class="face" data-face>
            <div class="eyes">
              <div class="eye"><div class="pupil" data-pupil></div></div>
              <div class="eye"><div class="pupil" data-pupil></div></div>
            </div>
            <div class="mouth" data-mouth></div>
          </div>
        </div>
      </div>
    </section>

    <!-- 右：登录卡片 -->
    <section class="panel">
      <div class="card">
        <h1 class="title">Welcome back!</h1>
        <div class="subtitle">请输入账号密码登录控制台</div>

        <form method="post" action="/login" id="loginForm">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" autocomplete="username" placeholder="admin" required />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••••••" required />
          </div>

          <div class="row">
            <span>Session will expire after restart</span>
            <a href="javascript:void(0)">Forgot password?</a>
          </div>

          <button class="btn" type="submit" id="loginBtn">Log in</button>

          {% if error %}
            <div class="error">{{ error }}</div>
          {% endif %}
        </form>
      </div>
    </section>
  </div>

  <script>
    // ===== 小人互动逻辑 =====
    const hero = document.getElementById('hero');
    const crew = document.getElementById('crew');
    const chars = [...document.querySelectorAll('[data-char]')];
    const faces = [...document.querySelectorAll('[data-face]')];
    const pupils = [...document.querySelectorAll('[data-pupil]')];
    const mouths = [...document.querySelectorAll('[data-mouth]')];

    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');

    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    function setPupilByMouse(clientX, clientY){
      pupils.forEach(p => {
        const eye = p.parentElement;
        const r = eye.getBoundingClientRect();

        const cx = r.left + r.width/2;
        const cy = r.top + r.height/2;

        const dx = clientX - cx;
        const dy = clientY - cy;

        // 限制瞳孔移动半径
        const maxMove = 4.5;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const mx = clamp(dx/dist * maxMove, -maxMove, maxMove);
        const my = clamp(dy/dist * maxMove, -maxMove, maxMove);

        p.style.transform = `translate(calc(-50% + ${mx}px), calc(-50% + ${my}px))`;
      });
    }

    // 嘴巴也跟随一点点（更有生命感）
    function setMouthByMouse(clientX){
      mouths.forEach(m => {
        const r = m.getBoundingClientRect();
        const cx = r.left + r.width/2;
        const dx = clientX - cx;
        const tilt = clamp(dx / 180, -0.6, 0.6);
        m.style.transform = `rotate(${tilt}deg)`;
      });
    }

    // 输入时：小人整体脸转向左边（表示“别看我输密码”）
    function lookLeft(on){
      faces.forEach(f => {
        f.style.transform = on
          ? "translateX(-50%) translateX(-10px)"
          : "translateX(-50%) translateX(0px)";
      });

      // 输入时瞳孔固定往左看一点
      if(on){
        pupils.forEach(p => p.style.transform = "translate(calc(-50% - 4px), calc(-50% + 0px))");
      }
    }

    // hover 登录按钮：小人微笑（嘴巴弯起来一点）
    function smile(on){
      mouths.forEach(m => {
        if(on){
          m.style.height = "16px";
          m.style.width = "40px";
          m.style.borderRadius = "0 0 22px 22px";
          m.style.transform = "rotate(0deg)";
          m.style.opacity = "0.9";
        }else{
          m.style.height = "12px";
          m.style.width = "34px";
          m.style.borderRadius = "0 0 16px 16px";
          m.style.opacity = "0.75";
        }
      });
    }

    // 鼠标移动：瞳孔&嘴跟随
    window.addEventListener('mousemove', (e) => {
      // 如果正在输入，就不跟随鼠标（保持“看左边”）
      const typing = document.activeElement === usernameInput || document.activeElement === passwordInput;
      if(typing) return;

      setPupilByMouse(e.clientX, e.clientY);
      setMouthByMouse(e.clientX);
    });

    // 输入框聚焦 / 失焦
    function onFocus(){
      lookLeft(true);
      smile(false);
    }
    function onBlur(){
      lookLeft(false);
    }

    usernameInput.addEventListener('focus', onFocus);
    passwordInput.addEventListener('focus', onFocus);
    usernameInput.addEventListener('blur', onBlur);
    passwordInput.addEventListener('blur', onBlur);

    // hover 登录按钮
    loginBtn.addEventListener('mouseenter', () => {
      const typing = document.activeElement === usernameInput || document.activeElement === passwordInput;
      if(!typing) smile(true);
    });
    loginBtn.addEventListener('mouseleave', () => smile(false));

    // 初始给一点点“默认注视”
    setPupilByMouse(window.innerWidth * 0.62, window.innerHeight * 0.45);
    setMouthByMouse(window.innerWidth * 0.62);
    // ===== 彩色粒子跟随特效（Canvas）=====
    const fxCanvas = document.getElementById("fxCanvas");
    const fxCtx = fxCanvas.getContext("2d", { alpha: true });
    
    function resizeFx() {
      // 用 devicePixelRatio 提高清晰度
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      fxCanvas.width = Math.floor(window.innerWidth * dpr);
      fxCanvas.height = Math.floor(window.innerHeight * dpr);
      fxCanvas.style.width = window.innerWidth + "px";
      fxCanvas.style.height = window.innerHeight + "px";
      fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resizeFx);
    resizeFx();
    
    // 粒子容器（限流，防止爆炸）
    const particles = [];
    const MAX_PARTICLES = 220;
    
    // 颜色（更“时尚”的一组偏柔和霓虹）
    const palette = [
      "rgba(99,102,241,0.85)",   // indigo
      "rgba(34,197,94,0.85)",    // green
      "rgba(245,158,11,0.85)",   // amber
      "rgba(236,72,153,0.85)",   // pink
      "rgba(56,189,248,0.85)"    // sky
    ];
    
    let lastEmit = 0;
    function emit(x, y) {
      const now = performance.now();
      // 发射频率限制：每 8ms 最多发一次（鼠标狂甩也稳）
      if (now - lastEmit < 8) return;
      lastEmit = now;
    
      // 每次发射少量粒子（更细腻）
      const count = 5;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.6 + Math.random() * 2.2;
        const size = 2 + Math.random() * 4.5;
    
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - (0.2 + Math.random() * 0.8),
          life: 1.0,
          decay: 0.015 + Math.random() * 0.02,
          size,
          color: palette[(Math.random() * palette.length) | 0],
        });
      }
    
      // 超过上限就丢弃最老的（队列裁剪）
      if (particles.length > MAX_PARTICLES) {
        particles.splice(0, particles.length - MAX_PARTICLES);
      }
    }
    
    // 只在登录页有效：鼠标移动触发
    window.addEventListener("mousemove", (e) => {
      emit(e.clientX, e.clientY);
    }, { passive: true });
    
    // 动画循环
    function tick() {
      fxCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    
      // 淡淡的“拖尾感”（更丝滑），不想要就注释这两行
      fxCtx.fillStyle = "rgba(255,255,255,0.05)";
      fxCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.985;      // 摩擦
        p.vy *= 0.985;
        p.vy += 0.02;       // 轻微“重力”
        p.life -= p.decay;
    
        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }
    
        // 画粒子（带一点柔光）
        fxCtx.globalAlpha = Math.max(0, p.life);
        fxCtx.beginPath();
        fxCtx.fillStyle = p.color;
        fxCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        fxCtx.fill();
    
        // 外层微光
        fxCtx.globalAlpha = Math.max(0, p.life) * 0.35;
        fxCtx.beginPath();
        fxCtx.fillStyle = p.color;
        fxCtx.arc(p.x, p.y, p.size * 2.2, 0, Math.PI * 2);
        fxCtx.fill();
      }
    
      fxCtx.globalAlpha = 1;
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
